version: "3.8"

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: book_store_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -Q \"SELECT 1\" -C",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - book_store_network

  # Backend API
  sqlserver-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: book_store_db_init
    depends_on:
      sqlserver:
        condition: service_healthy
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "/opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P 'YourStrong@Passw0rd' -Q \"IF DB_ID('book_store') IS NULL CREATE DATABASE book_store\"",
      ]
    networks:
      - book_store_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: book_store_api
    environment:
      PORT: 5000
      NODE_ENV: development
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_NAME: book_store
      DB_USER: sa
      DB_PASSWORD: YourStrong@Passw0rd
      DB_ENCRYPT: "false"
      DB_TRUST_SERVER_CERTIFICATE: "true"
      JWT_SECRET: your_super_secret_jwt_key_change_this_in_production
      FRONTEND_URL: http://localhost:5174
    ports:
      - "5000:5000"
    depends_on:
      sqlserver:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully
    networks:
      - book_store_network
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  sqlserver_data:

networks:
  book_store_network:
    driver: bridge
